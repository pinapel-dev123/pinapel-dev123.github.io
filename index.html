<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pineapple Clicker Game by pinapel-dev123</title>
    <style>
        /* Center everything on the screen vertically */
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2e3440; /* Linux dark theme */
            margin: 0;
            font-family: 'Courier New', Courier, monospace; /* Clean terminal look */
            color: #d8dee9;
            user-select: none; /* Prevents text highlighting while clicking */
        }

        /* Styling for the score display */
        .score-board {
            font-size: 2rem;
            margin-bottom: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        /* Standard styling for the image */
        .spinning-image {
            width: 250px;
            height: auto;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        /* Active effect when the image is pressed down */
        .spinning-image:active {
            transform: scale(0.95);
        }

        /* CSS class for the rotation animation */
        .rotate {
            animation: spin 2s linear infinite;
        }

        /* 360-degree rotation rule */
        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <!-- Score Display -->
    <div class="score-board">Score: <span id="scoreDisplay">0</span></div>

    <!-- Clickable Image -->
    <!-- Replace 'your-image.png' with your actual image file name -->
    <img src="pine.png" alt="pineapple" class="spinning-image" id="spinTarget">

    <script>
        // Select elements and initialize score counter
        const image = document.getElementById('spinTarget');
        const scoreDisplay = document.getElementById('scoreDisplay');
        let score = 0;

        // Handle the click event
        image.addEventListener('click', () => {
            // Increase the score by 1
            score++;
            scoreDisplay.textContent = score;

            // Start spinning on the very first click if it's not already spinning
            if (!image.classList.contains('rotate')) {
                image.classList.add('rotate');
            }
        });
    </script>

</body>
</html>
